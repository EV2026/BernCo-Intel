name: Scrape Motivated Seller Leads

on:
  schedule:
    # 7:00 AM UTC daily (midnight Mountain Time)
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      lookback_days:
        description: "Number of days to look back"
        required: false
        default: "7"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "scrape"
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    env:
      LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days || '7' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml dbfread playwright

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Create output directories
        run: |
          mkdir -p dashboard data

      - name: Run scraper
        run: python scraper/fetch.py
        env:
          LOOKBACK_DAYS: ${{ env.LOOKBACK_DAYS }}

      - name: Verify outputs
        run: |
          echo "=== dashboard/records.json ==="
          python -c "
          import json, sys
          with open('dashboard/records.json') as f:
              d = json.load(f)
          print(f'Total records: {d[\"total\"]}')
          print(f'With address:  {d[\"with_address\"]}')
          print(f'Fetched at:    {d[\"fetched_at\"]}')
          "
          echo "=== data/records.json ==="
          ls -lh data/records.json || echo "Missing data/records.json"
          echo "=== data/ghl_export.csv ==="
          wc -l data/ghl_export.csv || echo "Missing GHL CSV"

      - name: Commit and push updated records
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/records.json data/ghl_export.csv || true
          git diff --staged --quiet || git commit -m "chore: update leads $(date -u +'%Y-%m-%d %H:%M UTC') [lookback=${LOOKBACK_DAYS}d]"
          git push

  deploy-pages:
    runs-on: ubuntu-22.04
    needs: scrape
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main   # pull the freshly committed records.json
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Daily Motivated Seller Scrape

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  scrape-and-deploy:
    name: Scrape, Commit & Deploy
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4 lxml playwright

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          LOOKBACK_DAYS: "7"
        run: python scraper/fetch.py

      - name: Show summary
        run: |
          python - <<'EOF'
          import json, pathlib
          p = pathlib.Path("dashboard/records.json")
          if p.exists():
              d = json.loads(p.read_text())
              print(f"Fetched at : {d.get('fetched_at')}")
              print(f"Date range : {d.get('date_range')}")
              print(f"Total leads: {d.get('total')}")
              print(f"With addr  : {d.get('with_address')}")
          else:
              print("No records.json found")
          EOF

      - name: Commit updated records
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main
          git add dashboard/records.json data/records.json data/ghl_export_*.csv || true
          git diff --cached --quiet || git commit -m "chore: update records $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: Daily Motivated Seller Scrape

on:
  schedule:
    - cron: "0 7 * * *"   # 07:00 UTC = ~01:00 AM MDT / ~midnight MST
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "scrape-and-deploy"
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  scrape:
    name: Scrape & Commit Records
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper/requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml dbfread playwright

      - name: Install Playwright browsers (Chromium + system deps)
        run: python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          LOOKBACK_DAYS: "7"
        run: python scraper/fetch.py

      - name: Show summary
        run: |
          echo "=== records.json summary ==="
          python - <<'EOF'
          import json, pathlib
          p = pathlib.Path("dashboard/records.json")
          if p.exists():
              d = json.loads(p.read_text())
              print(f"Fetched at : {d.get('fetched_at')}")
              print(f"Date range : {d.get('date_range')}")
              print(f"Total leads: {d.get('total')}")
              print(f"With addr  : {d.get('with_address')}")
          else:
              print("No records.json found")
          EOF

      - name: Commit and push updated records
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/records.json data/records.json data/ghl_export_*.csv || true
          git diff --cached --quiet || git commit -m "chore: update records $(date -u '+%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin main || true
          git push

  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy Dashboard to GitHub Pages
    runs-on: ubuntu-22.04
    needs: scrape
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload dashboard/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
